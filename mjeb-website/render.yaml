services:
  - type: web
    name: mjeb-website
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: mjeb-website
      - key: OWNER_OPEN_ID
        value: admin
      - key: NODE_VERSION
        value: 20.11.0
      - key: PNPM_VERSION
        value: 10.4.1
